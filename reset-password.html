<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - Portal RESPEK</title>
    <meta name="theme-color" content="#A62122" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #A62122;
            --primary-hover: #8B1A1B;
            --bg: #F3F4F6;
            --card: rgba(255,255,255,0.92);
            --border: rgba(229,231,235,.85);
            --text: #111827;
            --muted: #6B7280;
            --success: #065F46;
            --success-bg: #D1FAE5;
            --danger: #991B1B;
            --danger-bg: #FEE2E2;
            --shadow-lg: 0 20px 50px -12px rgba(0,0,0,.16);
            --radius-lg: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f9fafb 0%, #ffffff 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -10%;
            right: -10%;
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(166,33,34,.05) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -12%;
            left: -8%;
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(166,33,34,.05) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .card {
            width: 100%;
            max-width: 430px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,.7);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 32px 24px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0 auto auto 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), #d22b2d, var(--primary));
        }

        .logo-badge {
            width: 72px;
            height: 72px;
            border-radius: 22px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            font-weight: 800;
            margin: 0 auto 18px;
            box-shadow: 0 12px 24px rgba(166,33,34,.25);
        }

        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -.3px;
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .alert {
            display: none;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 18px;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid #a7f3d0;
        }

        .alert-error {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid #fecaca;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 15px;
            font-family: inherit;
            background: rgba(249,250,251,.85);
            color: var(--text);
            transition: .25s ease;
        }

        .input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(166,33,34,.14);
        }

        .toggle-pass {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 18px;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            transition: .25s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #fff;
            box-shadow: 0 10px 24px rgba(166,33,34,.28);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(166,33,34,.35);
        }

        .btn-primary:disabled {
            background: #d1d5db;
            color: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            margin-top: 10px;
            background: rgba(255,255,255,.85);
            border: 1px solid var(--border);
            color: var(--text);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .helper-text {
            font-size: 12px;
            color: var(--muted);
            margin-top: 10px;
        }

        .status-box {
            text-align: center;
            padding: 18px 8px 8px;
            color: var(--muted);
            font-size: 14px;
        }

        .loader {
            width: 34px;
            height: 34px;
            border: 4px solid rgba(229,231,235,.9);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            margin: 0 auto 12px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-badge">🔐</div>
        <h1 class="title">Reset Password</h1>
        <p class="subtitle">Masukkan password baru untuk akun admin Anda.</p>

        <div id="alertBox" class="alert"></div>

        <div id="checkingState" class="status-box">
            <div class="loader"></div>
            Memeriksa link reset password...
        </div>

        <form id="resetForm" class="hidden">
            <div class="form-group">
                <label class="form-label" for="newPassword">🔒 Password Baru</label>
                <div class="input-wrap">
                    <input type="password" id="newPassword" class="input" placeholder="Minimal 6 karakter" autocomplete="new-password" />
                    <button type="button" class="toggle-pass" onclick="togglePassword('newPassword')">👁️</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">🔒 Konfirmasi Password</label>
                <div class="input-wrap">
                    <input type="password" id="confirmPassword" class="input" placeholder="Ulangi password baru" autocomplete="new-password" />
                    <button type="button" class="toggle-pass" onclick="togglePassword('confirmPassword')">👁️</button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="saveBtn">Simpan Password Baru</button>

            <div class="helper-text">
                Setelah berhasil, Anda akan diarahkan kembali ke halaman login admin.
            </div>
        </form>

        <a href="admin.html" class="btn btn-secondary">Kembali ke Login</a>
    </div>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            if (!input) return;
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function showAlert(message, type = 'success') {
            const el = document.getElementById('alertBox');
            if (!el) return;

            el.textContent = message;
            el.className = `alert show ${type === 'success' ? 'alert-success' : 'alert-error'}`;

            clearTimeout(el._timer);
            el._timer = setTimeout(() => {
                el.className = 'alert';
            }, 6000);
        }
    </script>

    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

        const supabaseUrl = 'https://giwjkzhyqwdshajdijlv.supabase.co';
        const supabaseKey = 'sb_publishable_E2LucdUE7rgpfqPwB9eMRA_KrGyL1Kc';
        const supabase = createClient(supabaseUrl, supabaseKey);

        const resetForm = document.getElementById('resetForm');
        const checkingState = document.getElementById('checkingState');
        const saveBtn = document.getElementById('saveBtn');

        function showForm() {
            checkingState.classList.add('hidden');
            resetForm.classList.remove('hidden');
        }

        function showInvalidLink(message) {
            checkingState.innerHTML = `
                <div style="font-weight:800; color:#991B1B; margin-bottom:8px;">Link reset tidak valid</div>
                <div style="font-size:13px; color:#6B7280;">${message}</div>
            `;
        }

        async function prepareRecoverySession() {
            try {
                const hash = window.location.hash.substring(1);
                const hashParams = new URLSearchParams(hash);

                const access_token = hashParams.get('access_token');
                const refresh_token = hashParams.get('refresh_token');
                const type = hashParams.get('type');

                if (type === 'recovery' && access_token && refresh_token) {
                    const { error } = await supabase.auth.setSession({
                        access_token,
                        refresh_token
                    });

                    if (error) throw error;

                    showForm();
                    return;
                }

                const { data, error } = await supabase.auth.getSession();
                if (error) throw error;

                if (data?.session?.user) {
                    showForm();
                    return;
                }

                showInvalidLink('Silakan minta link reset password baru dari halaman login admin.');
            } catch (error) {
                console.error(error);
                showInvalidLink('Token reset password tidak dapat diproses. Silakan kirim ulang email reset password.');
            }
        }

        resetForm?.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword || !confirmPassword) {
                showAlert('Semua field password wajib diisi.', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showAlert('Password baru minimal 6 karakter.', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('Konfirmasi password tidak sama.', 'error');
                return;
            }

            saveBtn.disabled = true;
            saveBtn.textContent = 'Menyimpan...';

            try {
                const { error } = await supabase.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;

                showAlert('Password berhasil diperbarui. Anda akan diarahkan ke halaman login.', 'success');

                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1800);
            } catch (error) {
                console.error(error);
                showAlert(error.message || 'Gagal memperbarui password.', 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = 'Simpan Password Baru';
            }
        });

        prepareRecoverySession();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Portal RESPEK</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f9fafb 0%, #ffffff 100%);
      color: #111827;
      padding: 24px;
      text-align: center;
    }

    .card {
      max-width: 420px;
      background: rgba(255,255,255,.92);
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,.08);
    }

    .icon {
      font-size: 56px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      letter-spacing: -.3px;
    }

    p {
      color: #6b7280;
      line-height: 1.6;
      margin: 0 0 20px;
      font-size: 15px;
    }

    a {
      display: inline-block;
      background: #A62122;
      color: #fff;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Anda sedang offline</h1>
    <p>Koneksi internet terputus. Silakan sambungkan kembali lalu muat ulang halaman.</p>
    <a href="./index.html">Coba lagi</a>
  </div>
</body>
</html>
